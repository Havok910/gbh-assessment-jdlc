name: UI + API Tests (Playwright)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run API Tests
        run: |
          python -m pytest tests/api/ -q

      - name: Run UI Tests
        run: |
          # Important: Add project root to PYTHONPATH
          export PYTHONPATH=.
          python -m pytest tests/ui/ -q --browser chromium

      - name: Upload Test Reports & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            **/videos/
            **/screenshots/
          retention-days: 7